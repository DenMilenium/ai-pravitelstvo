# Nginx конфигурация для AI Правительство
# Размещает завершённые проекты по пути /projects/

location /projects/ {
    alias /var/www/ai-pravitelstvo/public/projects/;
    index index.html;
    try_files $uri $uri/ =404;
    
    # Включаем сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # Кэширование статики
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }
}
