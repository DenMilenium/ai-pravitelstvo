name: AI Правительство CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ==================== Десктоп ====================
  desktop-lint:
    name: Линтинг Десктоп
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Установка зависимостей
      run: |
        pip install flake8 black isort
    
    - name: Проверка стиля
      run: |
        flake8 ministries/desktop/projects --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check ministries/desktop/projects || true

  desktop-test:
    name: Тесты Десктоп
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Установка зависимостей
      run: |
        pip install pytest pytest-cov
        pip install -r ministries/desktop/projects/ai-assistant/requirements.txt
    
    - name: Запуск тестов
      run: |
        cd ministries/desktop/projects/ai-assistant
        pytest tests/ -v --cov=src || echo "Тесты будут добавлены позже"

  # ==================== Облако ====================
  cloud-lint:
    name: Линтинг Облако
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Линтинг
      run: |
        cd ministries/cloud/projects/cloudmind/api
        go vet ./...
        go fmt ./...

  cloud-test:
    name: Тесты Облако
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Запуск тестов
      run: |
        cd ministries/cloud/projects/cloudmind/api
        go test -v ./... || echo "Тесты будут добавлены позже"

  cloud-build:
    name: Сборка Docker
    runs-on: ubuntu-latest
    needs: [cloud-lint, cloud-test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Сборка образа
      run: |
        cd ministries/cloud/projects/cloudmind/api
        docker build -t ai-gov/cloudmind-api:${{ github.sha }} .
    
    - name: Проверка образа
      run: |
        docker run --rm ai-gov/cloudmind-api:${{ github.sha }} ./api --help || true

  # ==================== Документация ====================
  docs-check:
    name: Проверка документации
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Проверка README
      run: |
        test -f README.md || exit 1
        test -f CONTRIBUTING.md || exit 1
        test -f LICENSE || exit 1
